<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Data Input Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1 class="form-title">Farm Data Input</h1>
            <form id="farmForm">
                
                <!-- Soil Type -->
                <div class="form-group">
                    <label for="soilType">Soil Type <span class="required">*</span></label>
                    <select id="soilType" name="soilType" required>
                        <option value="">-- Select Soil Type --</option>
                        <option value="Loamy">Loamy</option>
                        <option value="Clay">Clay</option>
                        <option value="Sandy">Sandy</option>
                    </select>
                </div>

                <!-- Growing Season -->
                <div class="form-group">
                    <label for="season">Growing Season <span class="required">*</span></label>
                    <select id="season" name="season" required>
                        <option value="">-- Select Growing Season --</option>
                        <option value="Kharif">Kharif</option>
                        <option value="Rabi">Rabi</option>
                        <option value="Zaid">Zaid</option>
                    </select>
                </div>

                <!-- State/Region -->
                <div class="form-group">
                    <label for="state">State/Region <span class="required">*</span></label>
                    <select id="state" name="state" required>
                        <option value="">-- Select State/Region --</option>
                        <option value="Punjab">Punjab</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Karnataka">Karnataka</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                    </select>
                </div>

                <!-- Water/Irrigation -->
                <div class="form-group">
                    <label for="water">Water/Irrigation <span class="required">*</span></label>
                    <select id="water" name="water" required>
                        <option value="">-- Select Irrigation Level --</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <!-- Annual Rainfall (Range Slider) -->
                <div class="form-group">
                    <label for="rainfall">Annual Rainfall (mm) <span class="required">*</span></label>
                    <div class="slider-container">
                        <input type="range" id="rainfall" name="rainfall" min="0" max="3000" value="1500" class="slider">
                        <span id="rainfallValue" class="slider-value">1500 mm</span>
                    </div>
                </div>

                <!-- Average Temperature (Range Slider) -->
                <div class="form-group">
                    <label for="temperature">Avg Temperature (°C) <span class="required">*</span></label>
                    <div class="slider-container">
                        <input type="range" id="temperature" name="temperature" min="0" max="50" value="25" class="slider">
                        <span id="temperatureValue" class="slider-value">25 °C</span>
                    </div>
                </div>

                <!-- Land Area -->
                <div class="form-group">
                    <label for="landArea">Land Area (hectares) <span class="required">*</span></label>
                    <input type="number" id="landArea" name="landArea" min="0" step="0.1" placeholder="Enter land area" required>
                </div>

                <!-- Budget Level -->
                <div class="form-group">
                    <label for="budget">Budget Level <span class="required">*</span></label>
                    <select id="budget" name="budget" required>
                        <option value="">-- Select Budget Level --</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <!-- Additional Details -->
                <div class="form-group">
                    <label for="details">Additional Details</label>
                    <textarea id="details" name="details" rows="4" placeholder="Enter any additional information about your farm..."></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit">Get AI Recommendation</button>
            </form>

            <!-- Output Section -->
            <div id="outputSection" class="output-section hidden">
                <h2 class="output-title">Recommendation</h2>
                <div id="outputContent" class="output-content"></div>
                <button type="button" class="btn-clear" onclick="clearOutput()">Clear Output</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
